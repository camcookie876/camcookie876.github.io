 HERO

 EMBER SEARCH BAR 
<div class="ember-search-wrapper">
<form class="ember-search-box" id="emberSearchForm">
<input autocomplete="off" class="ember-search-input" id="emberQuery" placeholder="Search Ember…" required="" type="text"/>
<button class="ember-search-btn" type="submit">Search</button>
</form>
</div>
</section>

 FOOTER 
<footer class="footer">
<p>Ember Search • Prototype</p>
</footer>
 EMBER SEARCH JS 
<script>
document.getElementById("emberSearchForm").addEventListener("submit", function (e) {
  e.preventDefault();
  const q = document.getElementById("emberQuery").value.trim();
  if (!q) return;

  // Redirect to your search results page
  window.location.href = "results/?q=" + encodeURIComponent(q);
});
</script>
</body>
