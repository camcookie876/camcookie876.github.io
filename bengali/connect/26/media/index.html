html
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>মিডিয়া - সংযোগ করুন</title>
<link href="../bengali/styles.css" rel="stylesheet"/>
<script defer="" src="../cc-topbar.js"></script>
<style>
    .media-list{padding:1rem}
    .media-item{border:1px solid #ddd;padding:.5rem;margin:.5rem 0}
  </style>
</head>
<body>
 টপবার (অন্যান্য পৃষ্ঠাগুলির মতো) 
<div id="cc-topbar"></div>
<main>
<h1 id="page-title">মিডিয়া</h1>
<section id="user-info">
<p><strong>ইউজার আইডি:</strong> <span id="user-id">(লোড হচ্ছে)</span></p>
<p><strong>ব্যবহারকারীর নাম:</strong> <span id="username">(লোড হচ্ছে)</span></p>
</section>
<section class="media-list" id="media">
<p>মিডিয়া লোড হচ্ছে...</p>
</section>
</main>
<script>
    // Read user id/username from query params or localStorage as fallback
    function getParam(name){
      const url = new URL(location.href);
      return url.searchParams.get(name);
    }

    const userId = getParam('user') || localStorage.getItem('cc_user_id') || '(none)';
    const username = getParam('username') || localStorage.getItem('cc_username') || '(guest)';

    document.getElementById('user-id').textContent = userId;
    document.getElementById('username').textContent = username;

    // Placeholder: show where media would be located for this user
    const mediaEl = document.getElementById('media');
    mediaEl.innerHTML = '';
    const info = document.createElement('div');
    info.className = 'media-item';
    info.textContent = `Media for ${username} (id: ${userId}) would be listed here.`;
    mediaEl.appendChild(info);

    // Option buttons similar to topbar options (if topbar exposes a helper)
    function addOptionButtons(){
      const container = document.createElement('div');
      container.style.marginTop = '1rem';
      ['Upload','Albums','Settings'].forEach(label=>{
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.style.marginRight = '0.5rem';
        btn.addEventListener('click', ()=> alert(label + ' clicked'));
        container.appendChild(btn);
      });
      mediaEl.appendChild(container);
    }

    addOptionButtons();
  </script>
</body>
</html>
