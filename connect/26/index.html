<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Camcookie Connect 26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/connect/26/cc-auth.js"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    :root { --blue:#2563eb; --blue-dark:#1d4ed8; --bg:#eef3ff; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#dbe4ff; --danger:#dc2626; --radius:16px; --shadow:0 14px 30px rgba(37,99,235,.16);} *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:radial-gradient(circle at top right,#dbeafe,#f8fbff 45%,#eef2ff 100%)}
    #topbar{position:sticky;top:0;z-index:100;padding:12px 18px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between}
    #topbar .brand{font-weight:800}
    #main{width:min(1240px,100%);margin:0 auto;padding:18px}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}
    #loginBox{width:min(480px,100%);margin:42px auto}
    input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:10px}
    button{width:100%;margin-top:12px;border:none;border-radius:10px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:600;cursor:pointer}
    button.secondary{background:#fff;color:var(--blue-dark);border:1px solid var(--blue)}
    .muted{color:var(--muted)}
    .remember-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:14px}
    .remember-row input{width:auto;margin:0}
    #loadingOverlay{position:fixed;inset:0;background:rgba(238,243,255,.75);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:150}
    .spinner{width:42px;height:42px;border:4px solid #bfdbfe;border-top-color:var(--blue);border-radius:999px;animation:spin .9s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="topbar"><div class="brand">Camcookie Connect 26</div><a href="/connect/" style="color:white;text-decoration:none;border:1px solid rgba(255,255,255,.55);padding:6px 11px;border-radius:999px;">← Back to Connect</a></div>
  <div id="main">
    <div id="loginBox" class="card">
      <h1>Camcookie Connect</h1>
      <p class="muted">Sign in to your account or create one to continue.</p>
      <div style="display:flex; gap:10px; margin-bottom:8px;"><button id="modeLogin" class="secondary" style="margin-top:0;">Sign in mode</button><button id="modeSignup" class="secondary" style="margin-top:0;">Sign up mode</button></div>
      <input id="username" placeholder="Username" autocomplete="username" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      <label id="termsWrap" style="display:none; margin-top:12px; font-size:14px;"><input id="agreeTerms" type="checkbox" style="width:auto; margin-right:8px;"> I agree to the <a href="/connect/26/terms/" target="_blank" rel="noopener">Terms &amp; Conditions</a>.</label>
      <label class="remember-row"><input id="keepLoggedIn" type="checkbox" checked> Keep me logged in on this device</label>
      <div class="h-captcha" data-sitekey="2d84955c-0708-469a-aaf6-80ca0ba86d64" style="margin-top:12px; display:flex; justify-content:center;"></div>
      <button id="submitBtn">Sign in</button>
      <p class="muted" style="font-size: .85rem; margin-top: 12px;">By continuing, you agree to the <a href="/connect/26/terms/" target="_blank" rel="noopener">Terms &amp; Privacy</a>.</p>
      <p id="errorMsg" class="muted" style="color:var(--danger); margin-top:8px;"></p>
    </div>
  </div>
  <div id="loadingOverlay"><div class="card" style="width:min(340px,92vw);text-align:center;"><div class="spinner"></div><p class="muted">Processing sign in…</p></div></div>
<script>
const SUPABASE_URL = "https://uexubxzlmyjuktgeqfsf.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleHVieHpsbXlqdWt0Z2VxZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxODYsImV4cCI6MjA5MjIxMTE4Nn0.yuWkhA7b21uL2BGVn5zij6fSiBWQdCGXwevZyJN5EDE";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = (id)=>document.getElementById(id);
let authMode = 'login';

if (ccIsAuthenticated()) window.location.href='/connect/26/dashboard/';

function setLoading(s){$('loadingOverlay').style.display=s?'flex':'none';}
async function hashPassword(str){const enc=new TextEncoder().encode(str);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function createToken(user_id){const token=crypto.randomUUID().replace(/-/g,'');const expires=new Date(Date.now()+24*60*60*1000).toISOString();await client.from('tokens').insert({user_id,token,expires_at:expires});return token;}
function storeSession(token,user){const keep=$('keepLoggedIn').checked;ccSetSessionMode(keep?'local':'session');ccSetToken(token);ccSetUser(user.id,user.username,user.photo||'');}

async function login(){const u=$('username').value.trim(),p=$('password').value.trim();if(!u||!p){$('errorMsg').textContent='Enter username and password.';return;}if(!hcaptcha.getResponse()){ $('errorMsg').textContent='Please complete the captcha.'; return; }
setLoading(true);const hash=await hashPassword(p);const {data:user}=await client.from('users').select('*').eq('username',u).eq('password_hash',hash).maybeSingle();if(!user){$('errorMsg').textContent='Incorrect username or password.';setLoading(false);hcaptcha.reset();return;}const token=await createToken(user.id);storeSession(token,user);window.location.href='/connect/26/dashboard/';}
async function signup(){if(!$('agreeTerms').checked){$('errorMsg').textContent='You must agree to the Terms & Conditions.';return;}const u=$('username').value.trim(),p=$('password').value.trim();if(!u||!p){$('errorMsg').textContent='Enter username and password.';return;}if(!hcaptcha.getResponse()){ $('errorMsg').textContent='Please complete the captcha.'; return; }
setLoading(true);const hash=await hashPassword(p);const {data:exists}=await client.from('users').select('id').eq('username',u).maybeSingle();if(exists){$('errorMsg').textContent='Username already taken.';setLoading(false);hcaptcha.reset();return;}const {data,error}=await client.from('users').insert({username:u,password_hash:hash}).select().single();if(error){$('errorMsg').textContent='Failed to create account.';setLoading(false);hcaptcha.reset();return;}const token=await createToken(data.id);storeSession(token,data);window.location.href='/connect/26/dashboard/';}
function setMode(mode){authMode=mode;const signupMode=mode==='signup';$('termsWrap').style.display=signupMode?'block':'none';$('submitBtn').textContent=signupMode?'Create account':'Sign in';$('errorMsg').textContent='';}
$('submitBtn').onclick=()=>authMode==='signup'?signup():login();$('modeLogin').onclick=()=>setMode('login');$('modeSignup').onclick=()=>setMode('signup');setMode('login');
</script>
</body>
</html>
