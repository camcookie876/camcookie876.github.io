<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat - Camcookie Connect 26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/connect/26/cc-auth.js"></script>
  <script src="/connect/26/cc-topbar.js"></script>
  <style>
    :root { --blue:#2563eb; --blue-dark:#1d4ed8; --bg:#eef3ff; --card:#fff; --text:#0f172a; --muted:#64748b; --border:#dbe4ff; --radius:16px; --shadow:0 14px 30px rgba(37,99,235,.16);} *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;color:var(--text);background:radial-gradient(circle at top right,#dbeafe,#f8fbff 45%,#eef2ff 100%)}
    #main{width:min(980px,100%);margin:0 auto;padding:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .muted{color:var(--muted)}
    .messages{height:min(60vh,520px);overflow:auto;background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:8px}
    .msg{max-width:72%;padding:8px 10px;border-radius:12px;border:1px solid var(--border);background:#fff}
    .me{margin-left:auto;background:#dbeafe;border-color:#93c5fd}
    .meta{font-size:.75rem;color:var(--muted);margin-bottom:2px}
    .bar{display:flex;gap:8px;margin-top:10px}
    input,button{font:inherit}
    input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px}
    button{border:none;border-radius:10px;padding:10px 14px;background:var(--blue);color:#fff;font-weight:600;cursor:pointer}
  </style>
</head>
<body>
<div id="topbar"></div>
<div id="main">
  <div class="card">
    <h2 style="margin-top:0">Camcookie Chat</h2>
    <p class="muted">Simple live chat room for signed-in users.</p>
    <div id="messages" class="messages"></div>
    <div class="bar">
      <input id="msgInput" placeholder="Type a message…" maxlength="500" />
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>
<script>
  ccRequireAuth();
  document.getElementById('topbar').innerHTML = ccCreateTopbarHTML();
  ccInitTopbar();

  const STORAGE_KEY = 'cc26_chat_room_v1';
  const user = ccGetUser();
  const box = document.getElementById('messages');
  const input = document.getElementById('msgInput');

  function getMessages(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function saveMessages(msgs){ localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs.slice(-250))); }

  function render(){
    const msgs = getMessages();
    box.innerHTML = '';
    msgs.forEach(m => {
      const el = document.createElement('div');
      el.className = 'msg' + (m.userId === user.id ? ' me' : '');
      const d = new Date(m.time);
      el.innerHTML = `<div class="meta">${m.username} · ${d.toLocaleString()}</div><div>${m.text.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</div>`;
      box.appendChild(el);
    });
    box.scrollTop = box.scrollHeight;
  }

  function send(){
    const text = input.value.trim();
    if(!text) return;
    const msgs = getMessages();
    msgs.push({ userId:user.id, username:user.username || 'User', text, time:new Date().toISOString() });
    saveMessages(msgs);
    input.value = '';
    render();
  }

  document.getElementById('sendBtn').onclick = send;
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') send(); });
  window.addEventListener('storage', (e)=>{ if(e.key===STORAGE_KEY) render(); });
  render();
</script>
</body>
</html>
