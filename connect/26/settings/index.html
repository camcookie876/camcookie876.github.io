<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Settings - Camcookie Connect 26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/connect/26/cc-auth.js"></script>
  <script src="/connect/26/cc-topbar.js"></script>
  <script src="/connect/26/cc-tracking.js"></script>

  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --cyan: #06b6d4;
      --bg: #eef3ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4ff;
      --danger: #dc2626;
      --success: #16a34a;
      --radius: 16px;
      --shadow: 0 14px 30px rgba(37, 99, 235, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, #f8fbff 45%, #eef2ff 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.25), rgba(37, 99, 235, 0));
      pointer-events: none;
      z-index: -1;
      animation: drift 20s ease-in-out infinite;
    }

    body::before { top: -140px; right: -110px; }
    body::after { bottom: -160px; left: -120px; animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(16px, -14px) scale(1.05); }
    }

    .hidden { display: none !important; }
    .muted { color: var(--muted); }

    #loadingScreen, #errorView {
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: min(520px, 100%);
      text-align: center;
      animation: rise .3s ease;
    }

    @keyframes rise {
      from { opacity: .5; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #bfdbfe;
      border-top-color: var(--blue);
      border-radius: 999px;
      animation: spin .9s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    #appShell {
      display: none;
      min-height: 100vh;
      padding: 24px 18px;
    }

    .settings-container {
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--blue-dark);
    }

    .settings-section {
      margin-bottom: 24px;
    }

    .settings-section h2 {
      font-size: 1.1rem;
      color: var(--blue-dark);
      margin-top: 0;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 8px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button.submit {
      width: 100%;
      margin-top: 12px;
      background: var(--blue);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }

    button.submit:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
    }

    button.submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .danger {
      color: var(--danger);
      font-weight: 600;
      margin-top: 8px;
    }

    .success {
      color: var(--success);
      font-weight: 600;
      margin-top: 8px;
    }

    #popup {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 999;
      background: var(--blue);
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 8px 18px rgba(37,99,235,.35);
    }

    #popup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .back-button {
      display: inline-block;
      margin-bottom: 16px;
      text-decoration: none;
      color: var(--blue);
      font-weight: 600;
    }

    .back-button:hover {
      text-decoration: underline;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: #f8fbff;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .toggle-label {
      flex: 1;
      margin: 0;
    }

    .toggle-switch {
      width: 48px;
      height: 28px;
      background: #ccc;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s ease;
    }

    .toggle-switch.active {
      background: var(--success);
    }

    .toggle-switch::before {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 12px;
      top: 2px;
      left: 2px;
      transition: left 0.3s ease;
    }

    .toggle-switch.active::before {
      left: 22px;
    }
  </style>
</head>
<body>
  <noscript>
    <div style="background: #dc2626; color: white; padding: 20px; text-align: center; font-weight: 600;">
      JavaScript is required to use Camcookie Connect 26. Please enable JavaScript in your browser settings.
    </div>
  </noscript>

<div id="topbar"></div>

<div id="loadingScreen" class="hidden">
  <div class="panel">
    <div class="spinner"></div>
    <p>Loading settings...</p>
  </div>
</div>

<div id="errorView" class="hidden">
  <div class="panel">
    <p id="errorMsg" class="muted" style="color:var(--danger);"></p>
    <button onclick="window.location.href='/connect/26/';">Return to Login</button>
  </div>
</div>

<div id="appShell">
  <div class="settings-container">
    <a href="/connect/26/dashboard/" class="back-button">← Back to Dashboard</a>
    <div class="card">
      <h1>Settings</h1>

      <!-- Account Section -->
      <div class="settings-section">
        <h2>Account</h2>
        <label for="newUsername">New Username</label>
        <input type="text" id="newUsername" placeholder="Enter new username">
        <button class="submit" id="changeUsernameBtn">Change Username</button>
        <p id="usernameMsg"></p>
      </div>

      <!-- Password Section -->
      <div class="settings-section">
        <h2>Password</h2>
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" placeholder="Enter current password">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password">
        <button class="submit" id="changePasswordBtn">Change Password</button>
        <p id="passwordMsg"></p>
      </div>

      <!-- Privacy & Leaderboard Section -->
      <div class="settings-section">
        <h2>Privacy & Leaderboard</h2>
        
        <div class="toggle-group">
          <label class="toggle-label">Public Profile</label>
          <div class="toggle-switch" id="publicToggle"></div>
        </div>
        <p class="muted" style="font-size: 0.85rem;">When enabled, your profile is visible to others.</p>

        <div class="toggle-group">
          <label class="toggle-label">Participate in Leaderboard</label>
          <div class="toggle-switch" id="leaderboardToggle"></div>
        </div>
        <p class="muted" style="font-size: 0.85rem;">When enabled, your score appears on the leaderboard.</p>

        <div class="toggle-group">
          <label class="toggle-label">Track Usage Score</label>
          <div class="toggle-switch" id="usageToggle"></div>
        </div>
        <p class="muted" style="font-size: 0.85rem;">When enabled, your activity is included in scoring.</p>
        
        <button class="submit" id="savePrivacyBtn">Save Privacy Settings</button>
        <p id="privacyMsg"></p>
      </div>
    </div>
  </div>
</div>

<div id="popup"></div>

<script>
  const SUPABASE_URL = "https://uexubxzlmyjuktgeqfsf.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleHVieHpsbXlqdWt0Z2VxZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxODYsImV4cCI6MjA5MjIxMTE4Nn0.yuWkhA7b21uL2BGVn5zij6fSiBWQdCGXwevZyJN5EDE";
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function $(id) { return document.getElementById(id); }

  async function hashPassword(str) {
    const enc = new TextEncoder().encode(str);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  function popup(msg) {
    const el = $("popup");
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2200);
  }

  function showLoading() {
    $("loadingScreen").classList.remove("hidden");
    $("errorView").classList.add("hidden");
    $("appShell").style.display = "none";
  }

  function showError(msg) {
    $("loadingScreen").classList.add("hidden");
    $("errorView").classList.remove("hidden");
    $("appShell").style.display = "none";
    $("errorMsg").textContent = msg;
  }

  function showSettings() {
    $("loadingScreen").classList.add("hidden");
    $("errorView").classList.add("hidden");
    $("appShell").style.display = "block";
  }

  function renderTopbar() {
    const topbarDiv = $("topbar");
    topbarDiv.innerHTML = ccCreateTopbarHTML();
  }

  function setToggleState(toggleEl, state) {
    if (state) {
      toggleEl.classList.add('active');
    } else {
      toggleEl.classList.remove('active');
    }
  }

  function getToggleState(toggleEl) {
    return toggleEl.classList.contains('active');
  }


  async function loadPrivacySettings(userId) {
    const fallback = {
      public: ccGetSetting('public', true),
      participate_leaderboard: ccGetSetting('participate_leaderboard', true),
      participate_usage: ccGetSetting('participate_usage', true)
    };

    const { data, error } = await client
      .from("users")
      .select("info")
      .eq("id", userId)
      .maybeSingle();

    if (error || !data) return fallback;

    const info = data.info || {};
    return {
      public: info.public ?? fallback.public,
      participate_leaderboard: info.participate_leaderboard ?? fallback.participate_leaderboard,
      participate_usage: info.participate_usage ?? fallback.participate_usage
    };
  }

  async function savePrivacySettings(userId, settings) {
    const { data: existing, error: fetchError } = await client
      .from("users")
      .select("info")
      .eq("id", userId)
      .maybeSingle();

    if (fetchError) return { error: fetchError };

    const nextInfo = {
      ...(existing?.info || {}),
      ...settings,
      privacy_updated_at: new Date().toISOString()
    };

    return client
      .from("users")
      .update({ info: nextInfo })
      .eq("id", userId);
  }

  async function initUI() {
    const user = ccGetUser();
    if (!user) return;

    const privacy = await loadPrivacySettings(user.id);
    const isPublic = privacy.public;
    const participateLeaderboard = privacy.participate_leaderboard;
    const participateUsage = privacy.participate_usage;

    setToggleState($("publicToggle"), isPublic);
    setToggleState($("leaderboardToggle"), participateLeaderboard);
    setToggleState($("usageToggle"), participateUsage);

    // Setup toggle clicks
    $("publicToggle").onclick = () => $("publicToggle").classList.toggle('active');
    $("leaderboardToggle").onclick = () => $("leaderboardToggle").classList.toggle('active');
    $("usageToggle").onclick = () => $("usageToggle").classList.toggle('active');

    // Change username
    $("changeUsernameBtn").onclick = async () => {
      const newUsername = $("newUsername").value.trim();
      if (!newUsername) {
        $("usernameMsg").textContent = "Please enter a new username.";
        $("usernameMsg").className = "danger";
        return;
      }

      const { data: exists } = await client
        .from("users")
        .select("id")
        .eq("username", newUsername)
        .maybeSingle();

      if (exists) {
        $("usernameMsg").textContent = "Username already taken.";
        $("usernameMsg").className = "danger";
        return;
      }

      const { error } = await client
        .from("users")
        .update({ username: newUsername })
        .eq("id", user.id);

      if (error) {
        $("usernameMsg").textContent = "Failed to change username.";
        $("usernameMsg").className = "danger";
        return;
      }

      user.username = newUsername;
      ccSetUser(user.id, newUsername, user.profile_photo || user.photo || '');
      $("usernameMsg").textContent = "Username changed successfully!";
      $("usernameMsg").className = "success";
      $("newUsername").value = "";
      popup("Username updated!");
    };

    // Change password
    $("changePasswordBtn").onclick = async () => {
      const currentPass = $("currentPassword").value.trim();
      const newPass = $("newPassword").value.trim();
      const confirmPass = $("confirmPassword").value.trim();

      if (!currentPass || !newPass || !confirmPass) {
        $("passwordMsg").textContent = "Please fill in all fields.";
        $("passwordMsg").className = "danger";
        return;
      }

      if (newPass !== confirmPass) {
        $("passwordMsg").textContent = "New passwords don't match.";
        $("passwordMsg").className = "danger";
        return;
      }

      const currentHash = await hashPassword(currentPass);
      const newHash = await hashPassword(newPass);

      const { data: checkUser } = await client
        .from("users")
        .select("*")
        .eq("id", user.id)
        .eq("password_hash", currentHash)
        .maybeSingle();

      if (!checkUser) {
        $("passwordMsg").textContent = "Current password is incorrect.";
        $("passwordMsg").className = "danger";
        return;
      }

      const { error } = await client
        .from("users")
        .update({ password_hash: newHash })
        .eq("id", user.id);

      if (error) {
        $("passwordMsg").textContent = "Failed to change password.";
        $("passwordMsg").className = "danger";
        return;
      }

      $("passwordMsg").textContent = "Password changed successfully!";
      $("passwordMsg").className = "success";
      $("currentPassword").value = "";
      $("newPassword").value = "";
      $("confirmPassword").value = "";
      popup("Password updated!");
    };

    // Save privacy settings
    $("savePrivacyBtn").onclick = async () => {
      const isPublic = getToggleState($("publicToggle"));
      const participateLeaderboard = getToggleState($("leaderboardToggle"));
      const participateUsage = getToggleState($("usageToggle"));

      const { error } = await savePrivacySettings(user.id, {
        public: isPublic,
        participate_leaderboard: participateLeaderboard,
        participate_usage: participateUsage
      });

      if (error) {
        $("privacyMsg").textContent = "Failed to save privacy settings.";
        $("privacyMsg").className = "danger";
        return;
      }

      ccSetSetting('public', isPublic);
      ccSetSetting('participate_leaderboard', participateLeaderboard);
      ccSetSetting('participate_usage', participateUsage);

      $("privacyMsg").textContent = "Privacy settings saved!";
      $("privacyMsg").className = "success";
      popup("Settings updated!");
    };
  }

  function init() {
    showLoading();
    const token = ccGetToken();
    const user = ccGetUser();

    if (!token || !user) {
      showError('Please log in first.');
      return;
    }

    renderTopbar();
    initUI().catch((err) => {
      console.error(err);
      showError('Unable to load settings. Please try again.');
    });
    ccInitTopbar();
    showSettings();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
