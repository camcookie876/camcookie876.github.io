<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in — Connect 26.5</title>
  <link rel="stylesheet" href="/connect/26.5/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/connect/26.5/common.js"></script>
</head>
<body>
  <div id="topbar"></div>
  <main class="page-wrap">
    <section id="loginBox" class="card">
      <h1>Sign in</h1>
      <p class="status muted">Enter your credentials to continue.</p>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <div style="display:flex;gap:8px;margin-top:10px">
        <button id="signInBtn" class="button">Sign in</button>
        <a href="/connect/26.5/signup/" class="button secondary">Create account</a>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    renderTopbar('login');
    const client = supabaseClient;
    async function hashPassword(str) { const enc = new TextEncoder().encode(str); const buf = await crypto.subtle.digest('SHA-256', enc); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
    document.getElementById('signInBtn').onclick = async () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      if (!u || !p) return showError(document.getElementById('status'), 'Enter username and password');
      showToast('Signing in…');
      const hash = await hashPassword(p);
      const { data } = await client.from('users').select('*').eq('username', u).eq('password_hash', hash).maybeSingle();
      if (!data) return showError(document.getElementById('status'),'Incorrect username or password');
      // create token
      const token = crypto.randomUUID().replace(/-/g,'');
      const expires = new Date(Date.now()+24*60*60*1000).toISOString();
      await client.from('tokens').insert({ user_id: data.id, token, expires_at: expires });
      localStorage.setItem('session_token', token);
      // add to cc_sessions for multi-account switcher
      const sessions = JSON.parse(localStorage.getItem('cc_sessions')||'[]');
      sessions.push({ id: data.id, username: data.username, token });
      localStorage.setItem('cc_sessions', JSON.stringify(sessions));
      showToast('Signed in');
      window.location.href = '/connect/26.5/dashboard/';
    };
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Camcookie Connect 26.5</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../common.js"></script>
</head>
<body>
  <div id="topbar"></div>

  <main class="page-wrap">
    <section class="card form-card">
      <h1>Sign in</h1>
      <p class="small-note">Use your email and password to access the dashboard.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>

      <button id="loginBtn" class="button">Sign in</button>
      <p id="loginError" class="status"></p>

      <p class="small-note">New here? <a href="../signup/">Create an account</a></p>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    renderTopbar("login");

    async function initLogin() {
      const user = await getSessionUser();
      if (user) {
        window.location.href = "/connect/26.5/dashboard/";
      }
    }

    initLogin();

    $("loginBtn").addEventListener("click", async () => {
      showError($("loginError"), "");

      const email = $("email").value.trim();
      const password = $("password").value.trim();

      if (!email || !password) {
        showError($("loginError"), "Enter both email and password.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showError($("loginError"), error.message);
        return;
      }

      showToast("Signed in successfully.");
      window.location.href = "/connect/26.5/dashboard/";
    });
  </script>
</body>
</html>
