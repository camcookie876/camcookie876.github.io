<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · Camcookie Connect 26.5</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../common.js"></script>
</head>
<body>
  <div id="topbar"></div>

  <main class="page-wrap">
    <section class="card grid-2">
      <div>
        <h1>Dashboard</h1>
        <p class="small-note">Welcome back. Manage your profile, review organization membership, and jump to your teams.</p>
        <div id="profileCard" style="margin-top: 20px;"></div>
      </div>
      <div>
        <h2>Quick access</h2>
        <div class="link-row" style="flex-direction: column; align-items: stretch;">
          <a class="button" href="../organizations/">Manage organizations</a>
          <a class="button secondary" href="../">Home</a>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Profile settings</h2>
      <div class="form-group">
        <label>Email</label>
        <input id="emailDisplay" readonly />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input id="usernameDisplay" placeholder="Username" />
      </div>
      <div class="form-group">
        <label>Real name</label>
        <input id="realnameDisplay" placeholder="Real name" />
      </div>
      <div class="form-group">
        <label>New password</label>
        <input id="newPassword" type="password" placeholder="Leave blank to keep existing" />
      </div>
      <button id="saveProfileBtn" class="button">Save profile</button>
      <p id="profileStatus" class="status"></p>
    </section>

    <section class="card">
      <h2>Organization membership</h2>
      <div id="orgSummary" class="small-note">Loading organizations...</div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    renderTopbar("dashboard");

    let currentUser = null;

    async function initDashboard() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      $("emailDisplay").value = currentUser.email || "";
      $("usernameDisplay").value = currentUser.user_metadata?.username || "";
      $("realnameDisplay").value = currentUser.user_metadata?.realname || "";
      $("profileCard").innerHTML = `
        <div class="small-note"><strong>Signed in as:</strong> ${currentUser.email || "Unknown"}</div>
        <div class="small-note" style="margin-top: 6px;"><strong>User ID:</strong> ${currentUser.id}</div>
      `;

      await loadOrganizations();
    }

    async function loadOrganizations() {
      const summary = $("orgSummary");
      summary.textContent = "Loading organizations...";
      const { data, error } = await supabaseClient
        .from("organization_members")
        .select("*, organizations(*)")
        .eq("user_id", currentUser.id);

      if (error) {
        summary.textContent = "Unable to load organizations: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        summary.innerHTML = "You are not a member of any organizations yet. Visit the Organizations page to create or join one.";
        return;
      }

      summary.innerHTML = data.map(item => {
        const org = item.organizations;
        return `<div style="padding: 14px 16px; border-radius: 14px; margin-bottom: 12px; background: #f8fbff; border: 1px solid rgba(219,228,255,.95);">
          <strong>${org.name}</strong><br />
          <span class="small-note">Role: ${item.role || "member"}</span><br />
          <span class="small-note">Code: <strong>${org.join_code || "not set"}</strong></span>
        </div>`;
      }).join("");
    }

    $("saveProfileBtn").addEventListener("click", async () => {
      showError($("profileStatus"), "");
      const username = $("usernameDisplay").value.trim();
      const realname = $("realnameDisplay").value.trim();
      const password = $("newPassword").value;

      const updates = { data: {} };
      if (username) updates.data.username = username;
      if (realname) updates.data.realname = realname;

      if (Object.keys(updates.data).length > 0) {
        const { error } = await supabaseClient.auth.updateUser(updates);
        if (error) {
          showError($("profileStatus"), error.message);
          return;
        }
      }

      if (password) {
        const { error } = await supabaseClient.auth.updateUser({ password });
        if (error) {
          showError($("profileStatus"), error.message);
          return;
        }
      }

      showToast("Profile updated.");
      $("newPassword").value = "";
      await initDashboard();
    });

    initDashboard();
  </script>
</body>
</html>
