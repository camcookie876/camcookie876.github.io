<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account — Connect 26.5</title>
  <link rel="stylesheet" href="/connect/26.5/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/connect/26.5/common.js"></script>
</head>
<body>
  <div id="topbar"></div>
  <main class="page-wrap">
    <section class="card">
      <h1>Create account</h1>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <label style="display:block;margin-top:8px">Upload avatar (optional)</label>
      <input id="avatarFile" type="file" accept="image/*" />
      <button id="createBtn" class="button">Create account</button>
      <div id="status" class="status"></div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    renderTopbar('signup');
    const client = supabaseClient;
    document.getElementById('createBtn').onclick = async () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const file = document.getElementById('avatarFile').files[0];
      if (!u || !p) return showError(document.getElementById('status'),'Enter username and password');
      showToast('Creating account…');
      // check username
      const { data: exists } = await client.from('users').select('id').eq('username', u).maybeSingle();
      if (exists) return showError(document.getElementById('status'),'Username already taken');
      const hash = await (async function(str){ const enc=new TextEncoder().encode(str); const buf=await crypto.subtle.digest('SHA-256',enc); return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); })(p);

      let avatar_url = null;
      if (file) {
        const key = `avatars/${Date.now()}_${file.name}`;
        const put = await supabaseClient.storage.from('avatars').upload(key, file, { upsert: false }).catch(()=>null);
        if (put && put.data) {
          const { data: publicUrl } = supabaseClient.storage.from('avatars').getPublicUrl(key);
          avatar_url = publicUrl.publicUrl;
        }
      }

      const { data, error } = await client.from('users').insert({ username: u, password_hash: hash, photo: avatar_url }).select().single();
      if (error || !data) return showError(document.getElementById('status'),'Failed to create account');

      // create token
      const token = crypto.randomUUID().replace(/-/g,'');
      const expires = new Date(Date.now()+24*60*60*1000).toISOString();
      await client.from('tokens').insert({ user_id: data.id, token, expires_at: expires });
      localStorage.setItem('session_token', token);
      const sessions = JSON.parse(localStorage.getItem('cc_sessions')||'[]');
      sessions.push({ id: data.id, username: data.username, token });
      localStorage.setItem('cc_sessions', JSON.stringify(sessions));

      showToast('Account created');
      window.location.href = '/connect/26.5/dashboard/';
    };
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account · Camcookie Connect 26.5</title>
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../common.js"></script>
</head>
<body>
  <div id="topbar"></div>

  <main class="page-wrap">
    <section class="card form-card">
      <h1>Create account</h1>
      <p class="small-note">Sign up with your email and a secure password.</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" placeholder="Username" />
      </div>

      <div class="form-group">
        <label for="realname">Real name</label>
        <input id="realname" placeholder="Real name" />
      </div>

      <button id="signupBtn" class="button">Create account</button>
      <p id="signupError" class="status"></p>

      <p class="small-note">Already have an account? <a href="../login/">Sign in</a></p>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    renderTopbar("signup");

    async function initSignup() {
      const user = await getSessionUser();
      if (user) {
        window.location.href = "/connect/26.5/dashboard/";
      }
    }

    initSignup();

    $("signupBtn").addEventListener("click", async () => {
      showError($("signupError"), "");

      const email = $("email").value.trim();
      const password = $("password").value.trim();
      const username = $("username").value.trim();
      const realname = $("realname").value.trim();

      if (!email || !password || !username) {
        showError($("signupError"), "Email, password, and username are required.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            username,
            realname
          }
        }
      });

      if (error) {
        showError($("signupError"), error.message);
        return;
      }

      showToast("Account created. Redirecting...");
      window.location.href = "/connect/26.5/dashboard/";
    });
  </script>
</body>
</html>
