<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ember Search</title>
  <link rel="icon" href="/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Your Ember Light Theme Styles -->
  <link rel="stylesheet" href="/ember/script.js">

  <meta name="description" content="Ember — the Camcookie search engine.">
</head>

<body>

<!-- Your existing topbar JS -->
<script src="/ember/script.js"></script>

<noscript>
  <div style="background: #ffe6e6; border: 2px solid #ff4444; border-radius: 12px; padding: 16px; margin: 20px auto; max-width: 600px; text-align: center;">
    <h3 style="color: #cc0000; margin: 0 0 8px;">JavaScript Required</h3>
    <p style="margin: 0; color: #333;">This site requires JavaScript for navigation and search. Please enable JavaScript in your browser settings.</p>
  </div>
</noscript>

<main class="content">

  <section class="hero">
    <h1 class="header">EMBER</h1>
    <p class="subtitle">The Camcookie search engine.</p>
    <p>Fast. Independent. Always learning.</p>

    <!-- EMBER SEARCH BAR -->
    <div class="ember-search-wrapper" style="margin-top: 32px;">
      <form id="emberSearchForm" class="ember-search-box">
        <input 
          type="text" 
          id="emberQuery" 
          class="ember-search-input" 
          placeholder="Search the web with Ember"
          autocomplete="off"
          required
        >
        <button type="submit" class="ember-search-btn">Search</button>
      </form>
    </div>
  </section>

</main>

<footer class="footer">
  <p>Ember Search • Prototype</p>
</footer>

<!-- EMBER SEARCH JS -->
<script>
document.getElementById("emberSearchForm").addEventListener("submit", function (e) {
  e.preventDefault();
  const q = document.getElementById("emberQuery").value.trim();
  if (!q) return;

  // Redirect to your search results page
  window.location.href = "/results/?q=" + encodeURIComponent(q);
});
</script>

</body>
</html>
