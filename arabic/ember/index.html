<script>
document.getElementById("emberSearchForm").addEventListener("submit", function (e) {
  e.preventDefault();
  const q = document.getElementById("emberQuery").value.trim();
  if (!q) return;

  // Redirect to your search results page
  window.location.href = "results/?q=" + encodeURIComponent(q);
});
</script>
