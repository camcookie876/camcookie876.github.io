<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://uexubxzlmyjuktgeqfsf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleHVieHpsbXlqdWt0Z2VxZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxODYsImV4cCI6MjA5MjIxMTE4Nn0.yuWkhA7b21uL2BGVn5zij6fSiBWQdCGXwevZyJN5EDE";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById("usernameDisplay").textContent = localStorage.getItem("username") || "Guest";

    const url = new URL(window.location.href);
    const poolId = url.searchParams.get('id');

    async function loadPool() {
      const { data: pool } = await supabase.from('pools').select('*').eq('id', poolId).single();
      const { data: options } = await supabase.from('pool_options').select('*').eq('pool_id', poolId).order('position');

      const div = document.getElementById('pool');
      div.innerHTML = `<h2>${pool.title}</h2>` +
        options.map(o => `<button class="btn option-btn" onclick="vote('${o.id}')">${o.label}</button>`).join('');
    }

    window.vote = async function(optionId){
      await supabase.from('pool_votes').insert([{ pool_id: poolId, option_id: optionId, user_id: localStorage.getItem('user_id') || null }]);
      alert('Vote recorded');
    };

    loadPool();
  </script>
</body>
