<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tools - Camcookie Connect 26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/original/connect/26/cc-auth.js"></script>
  <script src="/original/connect/26/cc-topbar.js"></script>
  <script src="/original/connect/26/cc-icons.js"></script>
  <script src="/original/connect/26/cc-scoring.js"></script>
  <style>
    :root{--blue:#2563eb;--blue-dark:#1d4ed8;--muted:#64748b;--card:#fff;--border:#dbe4ff;--radius:12px;--shadow:0 14px 30px rgba(37,99,235,.12)}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:radial-gradient(circle at top right,#dbeafe,#f8fbff 45%,#eef2ff 100%);color:#0f172a}
    #topbar{position:sticky;top:0;z-index:100;padding:12px 18px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between}
    #main{max-width:1100px;margin:20px auto;padding:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .columns{display:flex;gap:18px}
    .left{flex:1}
    .right{width:420px}
    input,select{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;margin-top:8px}
    button{padding:10px 14px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
    .muted{color:var(--muted)}
    iframe{width:100%;height:70vh;border-radius:10px;border:1px solid var(--border)}
    @media(max-width:900px){.columns{flex-direction:column}.right{width:100%}}
  </style>
</head>
<body>

  <noscript>
    <div style="background: #dc2626; color: white; padding: 20px; text-align: center; font-weight: 600;">
      JavaScript is required to use Camcookie Connect 26. Please enable JavaScript in your browser settings.
    </div>
  </noscript>

  <div id="topbar"></div>

  <div id="main">
    <div class="card">
      <div class="columns">
        <div class="left">
          <h1>Create a Pool</h1>
          <p class="muted">Create a quick poll — your username and keys are applied from your Connect session.</p>

          <label>Pool Title</label>
          <input id="title" />

          <label>Option A</label>
          <input id="optA" />

          <label>Option B</label>
          <input id="optB" />

          <label>Visibility</label>
          <select id="visibility"><option value="public">Public</option><option value="unlisted">Unlisted</option><option value="private">Private</option></select>

          <div style="margin-top:12px"><button id="createBtn">Create Pool</button></div>

          <h3 style="margin-top:18px">Share Link</h3>
          <input id="embedOut" readonly />
        </div>

        <div class="right">
          <h3>Tools Preview</h3>
          <iframe src="/original/connect/26/tools/view/index.html"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Use the site's global Supabase (loaded via CDN above) for consistency
    const SUPABASE_URL = "https://uexubxzlmyjuktgeqfsf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleHVieHpsbXlqdWt0Z2VxZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxODYsImV4cCI6MjA5MjIxMTE4Nn0.yuWkhA7b21uL2BGVn5zij6fSiBWQdCGXwevZyJN5EDE";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById("createBtn").onclick = async () => {
      const title = document.getElementById("title").value.trim();
      const optA = document.getElementById("optA").value.trim() || 'A';
      const optB = document.getElementById("optB").value.trim() || 'B';
      const visibility = document.getElementById('visibility').value;

      if (!title) { alert('Please enter a title'); return; }

      // Create pool with visibility and owner if logged in
      const owner = (localStorage.getItem('user_id') || null);
      const { data: pool, error: poolErr } = await client
        .from('pools')
        .insert([{ title, visibility, owner }])
        .select()
        .single();

      if (poolErr) { console.error(poolErr); alert('Error creating pool'); return; }

      // Create options (ensure labels exist)
      const { error: optErr } = await client.from('pool_options').insert([
        { pool_id: pool.id, label: optA, position: 1 },
        { pool_id: pool.id, label: optB, position: 2 }
      ]);
      if (optErr) { console.error(optErr); alert('Error creating options'); return; }

      // Output embed link
      const link = `/original/connect/26/tools/view?id=${pool.id}`;
      const out = document.getElementById('embedOut');
      out.value = link;
      out.select();
      try { document.execCommand('copy'); alert('Link copied to clipboard'); } catch(e){}
    };

    // Render topbar using existing helper
    function renderTopbar(){
      const el = document.getElementById('topbar');
      if(window.ccCreateTopbarHTML){ el.innerHTML = ccCreateTopbarHTML(); }
      if(window.ccInitTopbar) setTimeout(ccInitTopbar,100);
    }

    renderTopbar();
  </script>

</body>
</html>
