html
<html>
<head>
<meta charset="utf-8"/>
<title>Спасылкі - Camcookie</title>
<meta content="A central directory of Camcookie site links for quick navigation." name="description"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<link href="/belarusian/styles.css" rel="stylesheet"/>
<style>
    .tree-container {
      background: var(--bg-white);
      padding: 28px;
      border-radius: var(--border-radius);
      border: 1px solid var(--border-color);
      border-left: 3px solid var(--primary-color);
      max-width: 100%;
      overflow-x: auto;
    }

    .tree-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tree-item {
      margin: 8px 0;
    }

    .tree-item > .tree-branch {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 4px;
      user-select: none;
      transition: all 0.2s ease;
    }

    .tree-item > .tree-branch:hover {
      background: rgba(15, 103, 255, 0.05);
    }

    .tree-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .tree-toggle.hidden {
      visibility: hidden;
    }

    .tree-toggle svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s ease;
      fill: var(--primary-color);
    }

    .tree-item.collapsed > .tree-children .tree-toggle svg {
      transform: rotate(-90deg);
    }

    .tree-branch-title {
      flex: 1;
      color: var(--text-dark);
      font-weight: 500;
    }

    .tree-branch-description {
      font-size: 12px;
      color: var(--text-light);
      margin-left: 24px;
      margin-top: 4px;
      font-weight: 400;
    }

    .tree-children {
      list-style: none;
      padding: 0;
      margin: 4px 0 4px 16px;
      border-left: 1px solid var(--border-color);
      padding-left: 16px;
      display: none;
    }

    .tree-item.expanded > .tree-children {
      display: block;
    }

    .tree-link-item {
      padding: 6px 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .tree-link-item a {
      display: block;
      color: var(--primary-color);
      text-decoration: none;
      padding: 2px 0;
      font-size: 14px;
      font-weight: 400;
    }

    .tree-link-item a:hover {
      text-decoration: underline;
      color: var(--primary-dark);
    }

    .tree-link-label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
      font-weight: 400;
    }
  </style>
</head>
<body>
<script src="/belarusian/script.js"></script>
<noscript>
<div style="background: #ffe6e6; border: 2px solid #ff4444; border-radius: 12px; padding: 16px; margin: 20px auto; max-width: 600px; text-align: center;">
<h3 style="color: #cc0000; margin: 0 0 8px;">Патрабуецца JavaScript</h3>
<p style="margin: 0; color: #333;">Гэты сайт патрабуе JavaScript для навігацыі і пошуку. </p>
<div style="margin-top: 12px;">
<a href="/belarusian/" style="display: inline-block; background: #0f67ff; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; margin: 4px;">дадому</a>
<a href="/belarusian/DOCS/" style="display: inline-block; background: #0f67ff; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; margin: 4px;">ДАКУМЕНТЫ</a>
<a href="/belarusian/books4now/" style="display: inline-block; background: #0f67ff; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; margin: 4px;">Кнігі</a>
</div>
</div>
</noscript>
<center><h1 class="header">Спасылкі на Camcookie</h1></center>
<div class="content">
<div class="tree-container">
<ul class="tree-list" id="tree-root"></ul>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const PADGE_FILE = '/belarusian/padge.json';
  const treeRoot = document.getElementById('tree-root');

  fetch(PADGE_FILE)
    .then(response => response.json())
    .then(data => {
      if (data.pages && Array.isArray(data.pages)) {
        const tree = buildTree(data.pages);
        renderTree(tree, treeRoot);
      }
    })
    .catch(error => console.error('Error loading pages:', error));

  function buildTree(pages) {
    const pathMap = new Map();
    
    pages.forEach(page => {
      const url = page.url
        .replace('https://camcookie876.github.io', '')
        .replace('https://camcookieg.github.io', '/games');
      const normalizedUrl = url.startsWith('/') ? url : `/${url}`;
      const pathParts = normalizedUrl.split('/').filter(Boolean);
      
      let current = pathMap;
      pathParts.forEach((part, idx) => {
        const path = '/' + pathParts.slice(0, idx + 1).join('/') + '/';
        
        if (!current.has(part)) {
          current.set(part, {
            name: formatName(part),
            path: path,
            children: new Map(),
            page: null
          });
        }
        
        if (idx === pathParts.length - 1) {
          current.get(part).page = page;
        }
        
        current = current.get(part).children;
      });
    });
    
    return pathMap;
  }

  function formatName(str) {
    return str
      .replace(/-/g, ' ')
      .replace(/\d+/g, m => m)
      .split(' ')
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join(' ');
  }

  function renderTree(tree, container) {
    tree.forEach((node, key) => {
      const li = document.createElement('li');
      li.className = 'tree-item expanded';

      const hasChildren = node.children.size > 0;
      
      const branch = document.createElement('div');
      branch.className = 'tree-branch';

      const toggle = document.createElement('div');
      toggle.className = hasChildren ? 'tree-toggle' : 'tree-toggle hidden';
      toggle.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/belarusian/></svg>`;

      const title = document.createElement('div');
      title.className = 'tree-branch-title';
      title.textContent = node.name;

      branch.appendChild(toggle);
      branch.appendChild(title);

      if (hasChildren) {
        branch.addEventListener('click', () => {
          li.classList.toggle('collapsed');
          li.classList.toggle('expanded');
        });
      }

      li.appendChild(branch);

      if (node.page) {
        const desc = document.createElement('div');
        desc.className = 'tree-branch-description';
        desc.textContent = node.page.description || '';
        li.appendChild(desc);
      }

      if (hasChildren) {
        const childList = document.createElement('ul');
        childList.className = 'tree-children';
        renderTree(node.children, childList);
        li.appendChild(childList);
      }

      container.appendChild(li);
    });
  }
});
</script>
</body>
</html>
