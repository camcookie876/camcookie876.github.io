<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Friends - Camcookie Connect 26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/connect/26/cc-auth.js"></script>
  <script src="/connect/26/cc-friends.js"></script>
  <script src="/connect/26/cc-topbar.js"></script>
  <script src="/connect/26/cc-icons.js"></script>

  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --cyan: #06b6d4;
      --bg: #eef3ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4ff;
      --danger: #dc2626;
      --success: #16a34a;
      --radius: 16px;
      --shadow: 0 14px 30px rgba(37, 99, 235, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, #f8fbff 45%, #eef2ff 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.25), rgba(37, 99, 235, 0));
      pointer-events: none;
      z-index: -1;
      animation: drift 20s ease-in-out infinite;
    }

    body::before { top: -140px; right: -110px; }
    body::after { bottom: -160px; left: -120px; animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(16px, -14px) scale(1.05); }
    }

    .hidden { display: none !important; }
    .muted { color: var(--muted); }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--blue);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }

    button:hover { background: var(--blue-dark); transform: translateY(-1px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button.secondary { background: #fff; color: var(--blue-dark); border: 1px solid var(--blue); }
    button.danger { background: var(--danger); }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    #loadingScreen, #errorView {
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      width: min(520px, 100%);
      text-align: center;
      animation: rise .3s ease;
    }

    @keyframes rise {
      from { opacity: .5; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #bfdbfe;
      border-top-color: var(--blue);
      border-radius: 999px;
      animation: spin .9s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #appShell {
      display: none;
      min-height: 100vh;
      padding: 24px 18px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--blue-dark);
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    .tab-button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .tab-button.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .friends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .friend-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.2s;
    }

    .friend-card:hover {
      border-color: var(--blue);
      box-shadow: var(--shadow);
    }

    .friend-photo {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      object-fit: cover;
      border: 3px solid var(--blue);
      margin: 0 auto 12px;
    }

    .friend-name {
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .friend-actions {
      display: flex;
      gap: 6px;
      flex-direction: column;
    }

    .friend-actions button {
      font-size: 0.85rem;
      padding: 6px 10px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      margin-bottom: 12px;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .search-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <noscript>
    <div style="background: #dc2626; color: white; padding: 20px; text-align: center;">
      <strong>JavaScript is required to use Camcookie Connect 26.</strong> Please enable JavaScript in your browser settings.
    </div>
  </noscript>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="panel card">
      <div class="spinner"></div>
      <h2>Loading Friends…</h2>
      <p class="muted">Getting your friends list ready.</p>
    </div>
  </div>

  <!-- Error -->
  <div id="errorView" class="hidden">
    <div class="panel card">
      <h2>Something went wrong.</h2>
      <p>Reload this page to try again.</p>
      <p class="muted" id="errorText"></p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="appShell">
    <div id="topbar"></div>

    <div class="container">
      <h1>Friends</h1>
      <p class="subtitle">Manage your friends and find new people to connect with.</p>

      <div class="tabs">
        <button class="tab-button active" data-tab="friends">My Friends (<span id="friendCount">0</span>)</button>
        <button class="tab-button" data-tab="invitations">Invitations (<span id="inviteCount">0</span>)</button>
        <button class="tab-button" data-tab="search">Find Friends</button>
      </div>

      <!-- Friends Tab -->
      <div class="tab-content active" id="friends-tab">
        <div id="friendsList" class="friends-grid"></div>
      </div>

      <!-- Invitations Tab -->
      <div class="tab-content" id="invitations-tab">
        <div id="invitationsList" class="friends-grid"></div>
      </div>

      <!-- Search Tab -->
      <div class="tab-content" id="search-tab">
        <div class="search-section">
          <input id="searchInput" type="text" placeholder="Search for friends by username…">
          <div id="searchResults" class="friends-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://uexubxzlmyjuktgeqfsf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVleHVieHpsbXlqdWt0Z2VxZnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxODYsImV4cCI6MjA5MjIxMTE4Nn0.yuWkhA7b21uL2BGVn5zij6fSiBWQdCGXwevZyJN5EDE";

    function $(id) { return document.getElementById(id); }

    function showLoading() {
      $("loadingScreen").style.display = "flex";
      $("appShell").style.display = "none";
      $("errorView").classList.add("hidden");
    }

    function showError(msg) {
      $("loadingScreen").style.display = "none";
      $("appShell").style.display = "none";
      $("errorView").classList.remove("hidden");
      $("errorText").textContent = msg;
    }

    function showApp() {
      $("loadingScreen").style.display = "none";
      $("appShell").style.display = "block";
      $("errorView").classList.add("hidden");
    }

    function renderFriends() {
      const userId = ccGetUser()?.id;
      if (!userId) return;

      const friends = ccGetFriendsDetails(userId);
      const container = $("friendsList");

      if (friends.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <p>No friends yet. Find and invite people to connect!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = friends.map(friend => `
        <div class="friend-card">
          <img class="friend-photo" src="${friend.profile_photo || 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="24" r="14" fill="#bfdbfe"/><rect x="10" y="40" width="44" height="20" rx="10" fill="#93c5fd"/></svg>`)}" alt="${friend.username}">
          <div class="friend-name">${friend.username}</div>
          <div class="friend-actions">
            <button class="secondary" onclick="alert('Chat coming soon!')">Chat</button>
            <button class="danger" onclick="removeFriend('${friend.id}')">Remove</button>
          </div>
        </div>
      `).join('');

      $("friendCount").textContent = friends.length;
    }

    function renderInvitations() {
      const userId = ccGetUser()?.id;
      if (!userId) return;

      const invites = ccGetIncomingInvitations(userId);
      const data = ccGetFriendsData();
      const container = $("invitationsList");

      if (invites.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <p>No pending invitations.</p>
          </div>
        `;
        $("inviteCount").textContent = '0';
        return;
      }

      container.innerHTML = invites.map(inviterId => {
        const inviter = data.invitations[userId][inviterId];
        return `
          <div class="friend-card">
            <img class="friend-photo" src="${inviter.profile_photo || 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="24" r="14" fill="#bfdbfe"/><rect x="10" y="40" width="44" height="20" rx="10" fill="#93c5fd"/></svg>`)}" alt="${inviter.username}">
            <div class="friend-name">${inviter.username}</div>
            <div class="friend-actions">
              <button onclick="acceptInvite('${inviterId}')">Accept</button>
              <button class="secondary" onclick="declineInvite('${inviterId}')">Decline</button>
            </div>
          </div>
        `;
      }).join('');

      $("inviteCount").textContent = invites.length;
    }

    function removeFriend(friendId) {
      const userId = ccGetUser()?.id;
      if (confirm('Remove this friend?')) {
        ccRemoveFriend(userId, friendId);
        renderFriends();
      }
    }

    function acceptInvite(inviterId) {
      const userId = ccGetUser()?.id;
      const user = ccGetUser();
      const data = ccGetFriendsData();
      const inviter = data.invitations[userId]?.[inviterId];
      
      if (inviter) {
        ccAcceptFriendInvitation(userId, user, inviterId, inviter);
        renderFriends();
        renderInvitations();
      }
    }

    function declineInvite(inviterId) {
      const userId = ccGetUser()?.id;
      ccDeclineFriendInvitation(userId, inviterId);
      renderInvitations();
    }

    async function init() {
      showLoading();

      if (!ccIsAuthenticated()) {
        showError('Please log in first.');
        return;
      }

      const topbarDiv = $("topbar");
      topbarDiv.innerHTML = ccCreateTopbarHTML();
      ccInitTopbar();

      // Setup tabs
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          $(btn.dataset.tab + '-tab').classList.add('active');
          
          if (btn.dataset.tab === 'search') {
            $("searchInput").focus();
          }
        };
      });

      // Search functionality
      $("searchInput").oninput = (e) => {
        const query = e.target.value.trim();
        if (query.length < 2) {
          $("searchResults").innerHTML = '';
          return;
        }

        const results = ccSearchUsers(query);
        const userId = ccGetUser()?.id;
        const friendIds = ccGetFriends(userId);

        $("searchResults").innerHTML = results.map(user => {
          const isFriend = friendIds.includes(user.id);
          return `
            <div class="friend-card">
              <img class="friend-photo" src="${user.profile_photo || 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="24" r="14" fill="#bfdbfe"/><rect x="10" y="40" width="44" height="20" rx="10" fill="#93c5fd"/></svg>`)}" alt="${user.username}">
              <div class="friend-name">${user.username}</div>
              <div class="friend-actions">
                ${isFriend ? '<button class="secondary" disabled>Friends</button>' : `<button onclick="sendInvite('${user.id}', '${user.username}')">Invite</button>`}
              </div>
            </div>
          `;
        }).join('');
      };

      renderFriends();
      renderInvitations();

      showApp();
    }

    function sendInvite(targetId, targetUsername) {
      const userId = ccGetUser()?.id;
      const user = ccGetUser();
      const targetUser = { username: targetUsername, profile_photo: '' };

      if (ccInviteFriend(userId, user, targetId, targetUser)) {
        alert(`Invitation sent to ${targetUsername}!`);
      } else {
        alert('Could not send invitation');
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
