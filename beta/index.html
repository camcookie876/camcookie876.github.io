<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Camcookie</title>
  <style>
/* Remove all default spacing */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, sans-serif;
  background: #ffffff;
  height: 100vh;
  overflow: hidden; /* Only one scrollbar */
}

/* Topbar */
#topbar {
  width: 100%;
  height: 60px;
  background: #0099ff;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

#topbar .brand {
  font-size: 22px;
  font-weight: 700;
}

#topbar .nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: 500;
}

#topbar .nav a:hover {
  text-decoration: underline;
}

/* Content area */
#app {
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 20px;
}
  </style>
</head>

<body>

  <!-- Topbar -->
  <div id="topbar">
    <div class="brand">Camcookie</div>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/books">Books</a>
      <a href="/series">Series</a>
      <a href="/about">About</a>
    </div>
  </div>

  <!-- Dynamic content -->
  <div id="app">Loading…</div>

  <script>
    const STORAGE_KEY = "current_page";
let pages = {};
let currentPage = null;

// Load JSON pages
async function loadPages() {
  const res = await fetch("pages.json");
  pages = await res.json();
}

// Render a page by key
function renderPage(key, push = true) {
  const page = pages[key];
  if (!page) return;

  currentPage = key;
  localStorage.setItem(STORAGE_KEY, key);

  document.title = page.title;
  document.getElementById("app").innerHTML = page.html;

  if (push) {
    history.pushState({ page: key }, page.title, page.url);
  }

  interceptLinks();
}

// Intercept internal links
function interceptLinks() {
  document.querySelectorAll("a[href]").forEach(a => {
    const href = a.getAttribute("href");

    if (href.startsWith("/")) {
      a.addEventListener("click", e => {
        e.preventDefault();

        const key = Object.keys(pages).find(k => pages[k].url === href);
        if (key) renderPage(key);
      });
    }
  });
}

// Back/forward buttons
window.onpopstate = (e) => {
  if (e.state?.page) {
    renderPage(e.state.page, false);
  }
};

// Initialize
(async () => {
  await loadPages();

  const saved = localStorage.getItem(STORAGE_KEY);
  const start = saved && pages[saved] ? saved : "home";

  renderPage(start, false);
})();
  </script>
</body>
</html>
